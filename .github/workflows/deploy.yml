name: Extensio.ai CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: node server.js &
        env:
          MONGO_URI: mongodb://localhost:27017/extensio-test
          PORT: 4000
          NODE_ENV: test
          RATE_LIMIT_BYPASS_SECRET: developer-secret

      - name: Wait for server
        run: |
          for i in {1..30}; do
            curl -s http://localhost:4000/api/health && break
            echo "Waiting for server..."
            sleep 1
          done

      - name: Run E2E tests
        run: node test-e2e.js
        env:
          RATE_LIMIT_BYPASS_SECRET: developer-secret

  deploy:
    name: Deploy to Render
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{}' || echo "Deploy hook not configured yet"
