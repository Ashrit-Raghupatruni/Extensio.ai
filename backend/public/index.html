<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extensio.ai | AI Chrome Extension Generator</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: rgba(30, 41, 59, 0.7);
      --border: rgba(255, 255, 255, 0.1);
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --error: #ef4444;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      background-image: radial-gradient(circle at 50% -20%, #1e3a8a 0%, var(--bg) 50%);
    }

    .container {
      width: 100%;
      max-width: 800px;
      margin-top: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #60a5fa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .card {
      background: var(--surface);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #e2e8f0;
    }

    input[type="text"],
    textarea {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.875rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s ease, transform 0.1s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
    }

    button:hover:not(:disabled) {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .button-success {
      background: var(--success);
    }

    .button-success:hover:not(:disabled) {
      background: #059669;
    }

    /* Logs Panel */
    .logs-panel {
      margin-top: 2rem;
      background: #020617;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      display: none;
    }

    .logs-header {
      background: rgba(30, 41, 59, 0.8);
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logs-content {
      padding: 1rem;
      font-family: 'Fira Code', 'Courier New', Courier, monospace;
      font-size: 0.875rem;
      height: 200px;
      overflow-y: auto;
      color: var(--text-muted);
    }

    .log-line {
      margin-bottom: 0.25rem;
      word-break: break-all;
    }

    .log-info { color: #60a5fa; }
    .log-success { color: #34d399; }
    .log-error { color: #f87171; }

    /* Results section */
    .results {
      margin-top: 2rem;
      display: none;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Loader */
    .loader {
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top: 3px solid white;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: none;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Extensio.ai</h1>
      <p class="subtitle">From prompt to packed Chrome Extension in seconds.</p>
    </header>

    <div class="card">
      <form id="generateForm">
        <div class="form-group">
          <label for="projectName">Project Name</label>
          <input type="text" id="projectName" placeholder="e.g. Tab Manager Pro" required>
        </div>

        <div class="form-group">
          <label for="prompt">Extension Description</label>
          <textarea id="prompt" placeholder="Describe what the extension should do. e.g. A popup extension that counts how many tabs are currently open and allows the user to close them all at once." required></textarea>
        </div>

        <button type="submit" id="generateBtn">
          <span id="btnText">Generate Extension</span>
          <div class="loader" id="loader"></div>
        </button>
      </form>

      <div class="results" id="results">
        <h3 style="margin-bottom: 1rem; color: var(--success);">✨ Extension Generated Successfully!</h3>
        <p style="margin-bottom: 1.5rem; color: var(--text-muted);" id="fileCountText"></p>
        <button id="downloadBtn" class="button-success">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          Download ZIP
        </button>
      </div>

      <div class="logs-panel" id="logsPanel">
        <div class="logs-header">
          <span>Generation Logs</span>
          <span id="logStatus">Waiting...</span>
        </div>
        <div class="logs-content" id="logsContent"></div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('generateForm');
    const generateBtn = document.getElementById('generateBtn');
    const btnText = document.getElementById('btnText');
    const loader = document.getElementById('loader');
    const logsPanel = document.getElementById('logsPanel');
    const logsContent = document.getElementById('logsContent');
    const logStatus = document.getElementById('logStatus');
    const results = document.getElementById('results');
    const downloadBtn = document.getElementById('downloadBtn');
    const fileCountText = document.getElementById('fileCountText');

    let currentDownloadUrl = '';

    function addLog(message, type = 'info') {
      const line = document.createElement('div');
      line.className = `log-line log-${type}`;
      
      const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      line.textContent = `[${time}] ${message}`;
      
      logsContent.appendChild(line);
      logsContent.scrollTop = logsContent.scrollHeight;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const prompt = document.getElementById('prompt').value.trim();
      const projectName = document.getElementById('projectName').value.trim();
      
      if (!prompt || !projectName) return;

      // Reset UI state
      generateBtn.disabled = true;
      btnText.textContent = 'Generating...';
      loader.style.display = 'block';
      results.style.display = 'none';
      
      logsPanel.style.display = 'block';
      logsContent.innerHTML = '';
      logStatus.textContent = 'Processing';
      logStatus.style.color = 'var(--text-muted)';
      
      addLog(`Starting generation for project: "${projectName}"`, 'info');
      addLog('Contacting Extensio.ai LLM engine...', 'info');

      try {
        const response = await fetch('/api/extensions/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, projectName })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to generate extension');
        }

        addLog(`Successfully parsed LLM JSON response`, 'success');
        addLog(`Validated structure (manifest_version 3 checked)`, 'success');
        
        // Log generated files
        if (data.fileList && data.fileList.length > 0) {
          addLog(`Generated ${data.fileList.length} files:`, 'info');
          data.fileList.forEach(file => {
            const kb = (file.size / 1024).toFixed(1);
            addLog(`  ↳ ${file.name} (${kb} KB)`, 'info');
          });
        }

        addLog(`Packed files into ZIP archive successfully`, 'success');
        
        // Update results UI
        logStatus.textContent = 'Complete';
        logStatus.style.color = 'var(--success)';
        
        currentDownloadUrl = data.downloadUrl;
        const zipKb = data.zipSize ? (data.zipSize / 1024).toFixed(1) + ' KB' : 'ready';
        
        fileCountText.textContent = `Packaged ${Object.keys(data.files).length} files into ${projectName.toLowerCase().replace(/\s+/g, '_')}.zip (${zipKb})`;
        results.style.display = 'block';

      } catch (error) {
        addLog(`Error: ${error.message}`, 'error');
        logStatus.textContent = 'Failed';
        logStatus.style.color = 'var(--error)';
      } finally {
        generateBtn.disabled = false;
        btnText.textContent = 'Generate Extension';
        loader.style.display = 'none';
      }
    });

    downloadBtn.addEventListener('click', () => {
      if (currentDownloadUrl) {
        window.location.href = currentDownloadUrl;
      }
    });
  </script>
</body>
</html>
